<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ user.surname }} {{ user.name }} - {{ city_name }}</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=f3a0fe3a-b07e-4840-a1da-06f18b2ddf13&lang=ru_RU" type="text/javascript"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>{{ city_name }}</h1>
        <h3>{{ user.surname }} {{ user.name }}</h3>
        <div id="map" style="width: 100%; height: 500px; margin-top: 20px;"></div>
        <a href="/" class="btn btn-primary mt-3">На главную</a>
    </div>
    <script type="text/javascript">
        ymaps.ready(init);
        function init() {
            var myMap = new ymaps.Map("map", {
                center: [{{ lat }}, {{ lon }}],
                zoom: 10
            });
            var placemark = new ymaps.Placemark([{{ lat }}, {{ lon }}], {
                balloonContentHeader: "{{ city_name }}",
                balloonContentBody: "{{ user.surname }} {{ user.name }}"
            });
            myMap.geoObjects.add(placemark);
        }
    </script>
</body>
</html>
